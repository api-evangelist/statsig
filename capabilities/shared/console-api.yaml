naftiko: "1.0.0-alpha1"

info:
  label: "Statsig Console API"
  description: "Statsig Console API for managing feature gates, experiments, dynamic configs, segments, layers, holdouts, metrics, and project configuration programmatically."
  tags:
    - Administration
    - Configuration Management
    - Feature Flags
    - Experimentation
    - Automation
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      STATSIG_CONSOLE_API_KEY: STATSIG_CONSOLE_API_KEY

capability:
  consumes:
    - type: http
      namespace: statsig-console
      baseUri: https://statsigapi.net/console/v1
      description: "Statsig Console API for project management and configuration."
      authentication:
        type: apikey
        key: STATSIG-API-KEY
        value: "{{STATSIG_CONSOLE_API_KEY}}"
        placement: header
      resources:
        - name: gates
          path: /gates
          description: "Feature gate management."
          operations:
            - name: list-gates
              method: GET
              description: "Returns all feature gates in the project."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items per page."
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-gate
              method: POST
              description: "Creates a new feature gate."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  isEnabled: "{{tools.isEnabled}}"
                  rules: "{{tools.rules}}"
                  tags: "{{tools.tags}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-gate
              method: GET
              description: "Retrieves a specific feature gate."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Gate name or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-gate
              method: DELETE
              description: "Permanently deletes a feature gate."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Gate name or ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: experiments
          path: /experiments
          description: "Experiment management."
          operations:
            - name: list-experiments
              method: GET
              description: "Returns all experiments in the project."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items per page."
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-experiment
              method: POST
              description: "Creates a new experiment."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"
                  hypothesis: "{{tools.hypothesis}}"
                  groups: "{{tools.groups}}"
                  allocation: "{{tools.allocation}}"
                  tags: "{{tools.tags}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: start-experiment
              method: PUT
              description: "Starts an experiment to begin user allocation."
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Experiment ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: segments
          path: /segments
          description: "Segment management."
          operations:
            - name: list-segments
              method: GET
              description: "Returns all user segments."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-segment
              method: POST
              description: "Creates a new user segment."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  type: "{{tools.type}}"
                  rules: "{{tools.rules}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: metrics
          path: /metrics
          description: "Metrics management."
          operations:
            - name: list-metrics
              method: GET
              description: "Returns all metric definitions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: audit-logs
          path: /audit_logs
          description: "Audit log access."
          operations:
            - name: list-audit-logs
              method: GET
              description: "Returns audit log entries for configuration changes."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max items per page."
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: statsig-console-rest
      resources:
        - path: /v1/gates
          name: gates
          description: "Feature gate management."
          operations:
            - method: GET
              name: list-gates
              description: "List all feature gates."
              call: "statsig-console.list-gates"
              with:
                limit: "rest.limit"
                page: "rest.page"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-gate
              description: "Create a feature gate."
              call: "statsig-console.create-gate"
              with:
                name: "rest.name"
                description: "rest.description"
                rules: "rest.rules"
                tags: "rest.tags"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/experiments
          name: experiments
          description: "Experiment management."
          operations:
            - method: GET
              name: list-experiments
              description: "List all experiments."
              call: "statsig-console.list-experiments"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-experiment
              description: "Create an experiment."
              call: "statsig-console.create-experiment"
              with:
                name: "rest.name"
                groups: "rest.groups"
                allocation: "rest.allocation"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: statsig-console-mcp
      transport: http
      tools:
        - name: list-feature-gates
          description: "List all feature gates in the Statsig project."
          hints:
            readOnly: true
            openWorld: true
          call: "statsig-console.list-gates"
          with:
            limit: "tools.limit"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-feature-gate
          description: "Create a new feature gate with targeting rules."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "statsig-console.create-gate"
          with:
            name: "tools.name"
            description: "tools.description"
            rules: "tools.rules"
            tags: "tools.tags"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-feature-gate
          description: "Get a specific feature gate by name."
          hints:
            readOnly: true
            openWorld: false
          call: "statsig-console.get-gate"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-feature-gate
          description: "Permanently delete a feature gate."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "statsig-console.delete-gate"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-experiments
          description: "List all experiments in the Statsig project."
          hints:
            readOnly: true
            openWorld: true
          call: "statsig-console.list-experiments"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-experiment
          description: "Create a new A/B test experiment with groups and parameter configuration."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "statsig-console.create-experiment"
          with:
            name: "tools.name"
            description: "tools.description"
            hypothesis: "tools.hypothesis"
            groups: "tools.groups"
            allocation: "tools.allocation"
            tags: "tools.tags"
          outputParameters:
            - type: object
              mapping: "$."

        - name: start-experiment
          description: "Start an experiment to begin allocating users to groups."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "statsig-console.start-experiment"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-segments
          description: "List all user segments in the project."
          hints:
            readOnly: true
            openWorld: true
          call: "statsig-console.list-segments"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-metrics
          description: "List all metric definitions used in experiment analysis."
          hints:
            readOnly: true
            openWorld: true
          call: "statsig-console.list-metrics"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-audit-logs
          description: "List audit log entries showing project configuration changes."
          hints:
            readOnly: true
            openWorld: true
          call: "statsig-console.list-audit-logs"
          with:
            limit: "tools.limit"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
