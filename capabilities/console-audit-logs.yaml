naftiko: 1.0.0-alpha2
info:
  label: Statsig Console API — Audit Logs
  description: 'Statsig Console API — Audit Logs. 1 operations. Lead operation: List audit logs. Self-contained Naftiko capability
    covering one Statsig business surface.'
  tags:
  - Statsig
  - Audit Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATSIG_API_KEY: STATSIG_API_KEY
capability:
  consumes:
  - type: http
    namespace: console-audit-logs
    baseUri: https://statsigapi.net/console/v1
    description: Statsig Console API — Audit Logs business capability. Self-contained, no shared references.
    resources:
    - name: audit_logs
      path: /audit_logs
      operations:
      - name: listauditlogs
        method: GET
        description: List audit logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: STATSIG-API-KEY
      value: '{{env.STATSIG_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: console-audit-logs-rest
    port: 8080
    description: REST adapter for Statsig Console API — Audit Logs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/audit-logs
      name: audit-logs
      description: REST surface for audit_logs.
      operations:
      - method: GET
        name: listauditlogs
        description: List audit logs
        call: console-audit-logs.listauditlogs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: console-audit-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Statsig Console API — Audit Logs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-audit-logs
      description: List audit logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: console-audit-logs.listauditlogs
      outputParameters:
      - type: object
        mapping: $.
