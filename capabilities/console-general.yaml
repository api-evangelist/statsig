naftiko: 1.0.0-alpha2
info:
  label: Statsig Console API
  description: 'Statsig Console API. 2 operations. Lead operation: List all tags. Self-contained Naftiko capability covering
    one Statsig business surface.'
  tags:
  - Statsig
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATSIG_API_KEY: STATSIG_API_KEY
capability:
  consumes:
  - type: http
    namespace: console-general
    baseUri: https://statsigapi.net/console/v1
    description: Statsig Console API business capability. Self-contained, no shared references.
    resources:
    - name: tags
      path: /tags
      operations:
      - name: listtags
        method: GET
        description: List all tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createtag
        method: POST
        description: Create a tag
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: STATSIG-API-KEY
      value: '{{env.STATSIG_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: console-general-rest
    port: 8080
    description: REST adapter for Statsig Console API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/tags
      name: tags
      description: REST surface for tags.
      operations:
      - method: GET
        name: listtags
        description: List all tags
        call: console-general.listtags
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createtag
        description: Create a tag
        call: console-general.createtag
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: console-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Statsig Console API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-all-tags
      description: List all tags
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: console-general.listtags
      outputParameters:
      - type: object
        mapping: $.
    - name: create-tag
      description: Create a tag
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: console-general.createtag
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
