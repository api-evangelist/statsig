naftiko: 1.0.0-alpha2
info:
  label: Statsig Console API — Holdouts
  description: 'Statsig Console API — Holdouts. 2 operations. Lead operation: List all holdouts. Self-contained Naftiko capability
    covering one Statsig business surface.'
  tags:
  - Statsig
  - Holdouts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATSIG_API_KEY: STATSIG_API_KEY
capability:
  consumes:
  - type: http
    namespace: console-holdouts
    baseUri: https://statsigapi.net/console/v1
    description: Statsig Console API — Holdouts business capability. Self-contained, no shared references.
    resources:
    - name: holdouts
      path: /holdouts
      operations:
      - name: listholdouts
        method: GET
        description: List all holdouts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createholdout
        method: POST
        description: Create a holdout
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: STATSIG-API-KEY
      value: '{{env.STATSIG_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: console-holdouts-rest
    port: 8080
    description: REST adapter for Statsig Console API — Holdouts. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/holdouts
      name: holdouts
      description: REST surface for holdouts.
      operations:
      - method: GET
        name: listholdouts
        description: List all holdouts
        call: console-holdouts.listholdouts
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createholdout
        description: Create a holdout
        call: console-holdouts.createholdout
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: console-holdouts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Statsig Console API — Holdouts. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-all-holdouts
      description: List all holdouts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: console-holdouts.listholdouts
      outputParameters:
      - type: object
        mapping: $.
    - name: create-holdout
      description: Create a holdout
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: console-holdouts.createholdout
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
