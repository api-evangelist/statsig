naftiko: 1.0.0-alpha2
info:
  label: Statsig Console API — Experiments
  description: 'Statsig Console API — Experiments. 7 operations. Lead operation: List all experiments. Self-contained Naftiko
    capability covering one Statsig business surface.'
  tags:
  - Statsig
  - Experiments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATSIG_API_KEY: STATSIG_API_KEY
capability:
  consumes:
  - type: http
    namespace: console-experiments
    baseUri: https://statsigapi.net/console/v1
    description: Statsig Console API — Experiments business capability. Self-contained, no shared references.
    resources:
    - name: experiments
      path: /experiments
      operations:
      - name: listexperiments
        method: GET
        description: List all experiments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createexperiment
        method: POST
        description: Create an experiment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: experiments-id
      path: /experiments/{id}
      operations:
      - name: getexperiment
        method: GET
        description: Get an experiment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: partiallyupdateexperiment
        method: PATCH
        description: Partially update an experiment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteexperiment
        method: DELETE
        description: Delete an experiment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: experiments-id-reset
      path: /experiments/{id}/reset
      operations:
      - name: resetexperiment
        method: PUT
        description: Reset an experiment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: experiments-id-start
      path: /experiments/{id}/start
      operations:
      - name: startexperiment
        method: PUT
        description: Start an experiment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: STATSIG-API-KEY
      value: '{{env.STATSIG_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: console-experiments-rest
    port: 8080
    description: REST adapter for Statsig Console API — Experiments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/experiments
      name: experiments
      description: REST surface for experiments.
      operations:
      - method: GET
        name: listexperiments
        description: List all experiments
        call: console-experiments.listexperiments
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createexperiment
        description: Create an experiment
        call: console-experiments.createexperiment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/experiments/{id}
      name: experiments-id
      description: REST surface for experiments-id.
      operations:
      - method: GET
        name: getexperiment
        description: Get an experiment
        call: console-experiments.getexperiment
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: partiallyupdateexperiment
        description: Partially update an experiment
        call: console-experiments.partiallyupdateexperiment
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteexperiment
        description: Delete an experiment
        call: console-experiments.deleteexperiment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/experiments/{id}/reset
      name: experiments-id-reset
      description: REST surface for experiments-id-reset.
      operations:
      - method: PUT
        name: resetexperiment
        description: Reset an experiment
        call: console-experiments.resetexperiment
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/experiments/{id}/start
      name: experiments-id-start
      description: REST surface for experiments-id-start.
      operations:
      - method: PUT
        name: startexperiment
        description: Start an experiment
        call: console-experiments.startexperiment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: console-experiments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Statsig Console API — Experiments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-all-experiments
      description: List all experiments
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: console-experiments.listexperiments
      outputParameters:
      - type: object
        mapping: $.
    - name: create-experiment
      description: Create an experiment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: console-experiments.createexperiment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-experiment
      description: Get an experiment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: console-experiments.getexperiment
      outputParameters:
      - type: object
        mapping: $.
    - name: partially-update-experiment
      description: Partially update an experiment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: console-experiments.partiallyupdateexperiment
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-experiment
      description: Delete an experiment
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: console-experiments.deleteexperiment
      outputParameters:
      - type: object
        mapping: $.
    - name: reset-experiment
      description: Reset an experiment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: console-experiments.resetexperiment
      outputParameters:
      - type: object
        mapping: $.
    - name: start-experiment
      description: Start an experiment
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: console-experiments.startexperiment
      outputParameters:
      - type: object
        mapping: $.
