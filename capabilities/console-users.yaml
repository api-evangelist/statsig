naftiko: 1.0.0-alpha2
info:
  label: Statsig Console API — Users
  description: 'Statsig Console API — Users. 1 operations. Lead operation: List users. Self-contained Naftiko capability covering
    one Statsig business surface.'
  tags:
  - Statsig
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STATSIG_API_KEY: STATSIG_API_KEY
capability:
  consumes:
  - type: http
    namespace: console-users
    baseUri: https://statsigapi.net/console/v1
    description: Statsig Console API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: STATSIG-API-KEY
      value: '{{env.STATSIG_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: console-users-rest
    port: 8080
    description: REST adapter for Statsig Console API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: List users
        call: console-users.listusers
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: console-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Statsig Console API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-users
      description: List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: console-users.listusers
      outputParameters:
      - type: object
        mapping: $.
