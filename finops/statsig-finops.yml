created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Feature Flags
  - Experimentation
  - Session Replay
description: 'FOCUS-aligned FinOps for Statsig: free tier plus a fixed Pro subscription with included
  event allowance and per-1K event overage, with custom event- or experiment-priced Enterprise contracts.
  Primary billable meters are metered events and session replays.'
sources:
  - https://www.statsig.com/pricing
  - https://docs.statsig.com/console-api/introduction
billingModel:
  pricingCategory: Subscription + Pay-As-You-Go Overage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
focusColumns:
  ServiceName: Statsig
  ServiceCategory: Feature Flags & Experimentation
  ProviderName: Statsig
  PublisherName: Statsig, Inc.
  InvoiceIssuerName: Statsig, Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: metered_events
    description: Exposures, logged events, ingested metrics, and custom metrics that count toward the
      monthly event allowance and overage billing.
    unit: event
    aggregation: sum
    dimensions:
      - project
      - event_type
      - environment
  - name: session_replays
    description: Recorded session replays counted against the plan's monthly replay allowance.
    unit: replay
    aggregation: sum
    dimensions:
      - project
      - environment
  - name: pro_subscription
    description: Fixed monthly Pro subscription fee ($150/month, one project).
    unit: month
    aggregation: sum
    dimensions:
      - project
  - name: enterprise_experiments
    description: Experiments-priced unit for Enterprise contracts that opt into experiment-based pricing.
    unit: experiment
    aggregation: sum
    dimensions:
      - project
      - environment
principles:
  - name: Visibility
    description: Use the Statsig Console (Project Settings > Usage) and the Console API to track event
      and session-replay consumption against the plan allowance; warning notifications fire before Metric
      Lifts stop on the free tier.
  - name: Allocation
    description: Tag exposures and logged events with project, environment, and stable user IDs so usage
      can be attributed to specific products, experiments, or teams. Multi-project Enterprise customers
      can isolate billing per project.
  - name: Optimization
    description: Reduce metered-event volume by deduplicating exposure logging at the SDK layer, sampling
      session replays, and pruning unused metrics; on Pro, watch the $0.05/1K overage meter; on Enterprise,
      negotiate event vs experiment pricing based on whichever model fits your workload best.
  - name: Accountability
    description: Assign a project owner per Statsig project; route the monthly invoice and any overage
      line items to that owner; review event growth before launching new feature gates or analytics events.
maintainers: []
