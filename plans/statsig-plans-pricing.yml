specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Statsig
providerId: statsig
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Feature Flags
  - Experimentation
  - Product Analytics
  - Session Replay
  - Developer Tools
description: Statsig prices its platform on a metered-events model with three tiers — a Free Developer
  tier (2M events/mo, 50k session replays/mo), a Pro plan ($150/mo, 5M events included, $0.05 per 1K
  additional events, 100k session replays/mo), and a custom Enterprise contract with volume discounts
  on event or experiment-based pricing. Flag and config checks are unlimited at every tier; metered events
  cover exposures, logged events, ingested metrics, and custom metrics.
sources:
  - https://www.statsig.com/pricing
  - https://docs.statsig.com/console-api/introduction
plans:
  - id: statsig-developer
    name: Developer
    type: freemium
    description: Free tier; no credit card required; one project. Unlimited flag and config checks.
      Metric Lifts stop calculating if event allowance is exceeded.
    entries:
      - label: Metered Events
        name: metered_events
        type: quota
        metric: event
        limit: 2000000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Session Replays
        name: session_replays
        type: quota
        metric: replay
        limit: 50000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Flag and Config Checks
        name: flag_config_checks
        type: quota
        metric: check
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Feature Flags
      - name: Experimentation
      - name: Product Analytics
      - name: Session Replay (capped)
      - name: Single Project
      - name: Community Support
  - id: statsig-pro
    name: Pro
    type: subscription
    description: $150/month subscription with 5M metered events included, 100k session replays/mo, and
      $0.05 per 1K additional events billed in the following month. One project per subscription.
    entries:
      - label: Subscription
        name: subscription
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$150'
        userMultiplied: false
      - label: Metered Events (included)
        name: metered_events_included
        type: quota
        metric: event
        limit: 5000000
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Metered Events (overage)
        name: metered_events_overage
        type: metered
        metric: event
        limit: -1
        timeFrame: month
        geo: global
        unit: 1000
        price: '$0.05'
        userMultiplied: false
      - label: Session Replays
        name: session_replays
        type: quota
        metric: replay
        limit: 100000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Flag and Config Checks
        name: flag_config_checks
        type: quota
        metric: check
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: All Free Features
      - name: Higher Event Allowance
      - name: Single Project
      - name: Email Support
  - id: statsig-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-priced contracts with volume discounts on event- or experiment-based pricing.
      Multi-project, warehouse-native deployment, outbound data integrations, SSO, and HIPAA-eligibility
      (BAA required) available. Custom billing and payment terms.
    entries:
      - label: Metered Events
        name: metered_events
        type: tiered
        metric: event
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
      - label: Experiments
        name: experiments
        type: tiered
        metric: experiment
        limit: -1
        timeFrame: month
        geo: configurable
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Multiple Projects
      - name: Warehouse Native Deployment
      - name: Outgoing Data Integrations
      - name: SSO
      - name: HIPAA-Eligibility (BAA)
      - name: Volume Discounts
      - name: Custom Billing Terms
maintainers: []
