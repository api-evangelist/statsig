    TargetApp:
      type: object
      description: >-
        A target application definition that scopes feature configurations.
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the target app.
        name:
          type: string
          description: >-
            The name of the target app.
        description:
          type: string
          description: >-
            A human-readable description.
    AuditLogEntry:
      type: object
      description: >-
        An audit log entry recording a change to the project configuration.
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the log entry.
        timestamp:
          type: integer
          format: int64
          description: >-
            Timestamp when the change occurred.
        user:
          type: object
          properties:
            name:
              type: string
              description: >-
                The name of the user who made the change.
            email:
              type: string
              format: email
              description: >-
                The email of the user who made the change.
          description: >-
            The user who made the change.
        action:
          type: string
          description: >-
            The action performed (e.g., created, updated, deleted).
        entityType:
          type: string
          description: >-
            The type of entity that was changed (e.g., gate, experiment).
        entityName:
          type: string
          description: >-
            The name of the entity that was changed.
        changes:
          type: object
          description: >-
            Details of the changes made.
    Pagination:
      type: object
      description: >-
        Pagination metadata for list responses.
      properties:
        total:
          type: integer
          description: >-
            Total number of items available.
        page:
          type: integer
          description: >-
            Current page number.
        limit:
          type: integer
          description: >-
            Number of items per page.
        hasMore:
          type: boolean
          description: >-
            Whether more pages are available.
  responses:
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: >-
                  Error message describing the authentication failure.
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: >-
                  Error message describing what was wrong with the request.
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: >-
                  Error message indicating the resource was not found.
