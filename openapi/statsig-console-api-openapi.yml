        name:
          type: string
          description: >-
            The name of the autotune to create.
        description:
          type: string
          description: >-
            A human-readable description.
        variants:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: >-
                  The name of the variant.
              parameterValues:
                type: object
                description: >-
                  The parameter values for this variant.
