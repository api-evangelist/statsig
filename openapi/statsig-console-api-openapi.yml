components:
  securitySchemes:
    consoleApiKey:
      type: apiKey
      in: header
      name: STATSIG-API-KEY
      description: >-
        Console API Key created in Project Settings > API Keys tab. Required
        for all Console API requests.
  parameters:
    ApiVersion:
      name: STATSIG-API-VERSION
      in: header
      required: false
      schema:
        type: string
        default: '20240601'
      description: >-
        The Console API version. Currently the only version is 20240601.
    GateId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: >-
        The name or identifier of the feature gate.
    DynamicConfigId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: >-
        The name or identifier of the dynamic config.
    ExperimentId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: >-
        The name or identifier of the experiment.
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
      description: >-
        Maximum number of items to return per page.
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: >-
        Page number for paginated results.
  schemas:
    Gate:
      type: object
      description: >-
        A feature gate configuration that controls access to features
        based on targeting rules and conditions.
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the gate.
        name:
          type: string
          description: >-
            The name of the gate.
        description:
          type: string
          description: >-
            A human-readable description of the gate purpose.
        isEnabled:
          type: boolean
          description: >-
            Whether the gate is currently enabled and evaluating rules.
        status:
          type: string
          enum:
            - active
            - disabled
            - launched
            - archived
          description: >-
            The current lifecycle status of the gate.
        rules:
          type: array
          items:
            $ref: '#/components/schemas/Rule'
          description: >-
            The targeting rules for this gate.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags associated with the gate for organization.
        targetApps:
          type: array
          items:
            type: string
          description: >-
            Target applications this gate is scoped to.
        createdTime:
          type: integer
          format: int64
          description: >-
            Timestamp when the gate was created.
        lastModifiedTime:
          type: integer
          format: int64
          description: >-
            Timestamp when the gate was last modified.
    GateCreate:
      type: object
      description: >-
        Request body for creating a new feature gate.
      required:
        - name
      properties:
        name:
          type: string
          description: >-
            The name of the gate to create.
        description:
          type: string
          description: >-
            A human-readable description of the gate purpose.
        isEnabled:
          type: boolean
          description: >-
            Whether the gate should be enabled upon creation.
        rules:
          type: array
          items:
            $ref: '#/components/schemas/Rule'
          description: >-
            Initial targeting rules for the gate.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags to associate with the gate.
        targetApps:
          type: array
          items:
            type: string
          description: >-
            Target applications to scope this gate to.
    GateUpdate:
      type: object
      description: >-
        Request body for partially updating a feature gate.
      properties:
        description:
          type: string
          description: >-
            Updated description of the gate purpose.
        isEnabled:
          type: boolean
          description: >-
            Whether the gate should be enabled.
        tags:
          type: array
          items:
            type: string
          description: >-
            Updated tags for the gate.
        targetApps:
          type: array
          items:
            type: string
          description: >-
            Updated target applications.
    Rule:
      type: object
      description: >-
        A targeting rule that defines conditions under which a gate passes
        or a config returns specific values.
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the rule.
        name:
          type: string
          description: >-
            The name of the rule.
        passPercentage:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            The percentage of users matching conditions who pass the rule.
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/Condition'
          description: >-
            The conditions that must be met for this rule to apply.
        returnValue:
          type: object
          description: >-
            The value returned when this rule matches, for dynamic configs.
        environments:
          type: array
          items:
            type: string
          description: >-
            Environments where this rule is active.
    Condition:
      type: object
      description: >-
        A condition within a targeting rule that evaluates user properties
        against specified criteria.
      properties:
        type:
          type: string
          enum:
            - user_id
            - email
            - ip_address
            - country
            - app_version
            - custom_field
            - browser_name
            - browser_version
            - os_name
            - os_version
            - passes_gate
            - fails_gate
            - environment
            - passes_segment
            - fails_segment
            - time
            - unit_id
          description: >-
            The type of condition to evaluate.
        targetValue:
          description: >-
            The value or values to compare against.
        operator:
          type: string
          enum:
            - any
            - none
            - str_starts_with_any
            - str_ends_with_any
            - str_contains_any
            - str_contains_none
            - str_matches
            - gt
            - gte
            - lt
            - lte
            - version_gt
            - version_gte
            - version_lt
            - version_lte
            - before
            - after
            - on
          description: >-
            The comparison operator to use.
    Overrides:
      type: object
      description: >-
        User and ID overrides for forcing specific evaluation results.
      properties:
        userOverrides:
          type: array
          items:
            type: object
            properties:
              userID:
                type: string
                description: >-
                  The user ID to override.
              value:
                type: boolean
                description: >-
                  The override value for this user.
          description: >-
            User-specific overrides by user ID.
        idOverrides:
          type: array
          items:
            type: object
            properties:
              ids:
                type: array
                items:
                  type: string
                description: >-
                  The IDs to override.
              value:
                type: boolean
                description: >-
                  The override value for these IDs.
          description: >-
            ID-based overrides for custom ID types.
    DynamicConfig:
      type: object
      description: >-
        A dynamic configuration that provides key-value pairs to clients
        based on targeting rules.
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the dynamic config.
        name:
          type: string
          description: >-
            The name of the dynamic config.
        description:
          type: string
          description: >-
            A human-readable description of the config purpose.
        isEnabled:
          type: boolean
          description: >-
            Whether the config is currently enabled.
        defaultValue:
          type: object
          description: >-
            The default key-value pairs returned when no rules match.
        rules:
          type: array
          items:
            $ref: '#/components/schemas/Rule'
          description: >-
            The targeting rules for this config.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags associated with the config.
        createdTime:
          type: integer
          format: int64
          description: >-
            Timestamp when the config was created.
        lastModifiedTime:
          type: integer
          format: int64
          description: >-
            Timestamp when the config was last modified.
    DynamicConfigCreate:
      type: object
      description: >-
        Request body for creating a new dynamic config.
      required:
        - name
      properties:
        name:
          type: string
          description: >-
            The name of the dynamic config to create.
        description:
          type: string
          description: >-
            A human-readable description of the config purpose.
        defaultValue:
          type: object
          description: >-
            The default key-value pairs.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags to associate with the config.
    DynamicConfigUpdate:
      type: object
      description: >-
        Request body for partially updating a dynamic config.
      properties:
        description:
          type: string
          description: >-
            Updated description.
        isEnabled:
          type: boolean
          description: >-
            Whether the config should be enabled.
        defaultValue:
          type: object
          description: >-
            Updated default key-value pairs.
        tags:
          type: array
          items:
            type: string
          description: >-
            Updated tags.
    Experiment:
      type: object
      description: >-
        An A/B test experiment with defined groups, parameters, and
        analysis configuration.
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the experiment.
        name:
          type: string
          description: >-
            The name of the experiment.
        description:
          type: string
          description: >-
            A human-readable description of the experiment.
        hypothesis:
          type: string
          description: >-
            The hypothesis being tested by this experiment.
        status:
          type: string
          enum:
            - setup
            - active
            - decision_made
            - abandoned
          description: >-
            The current status of the experiment.
        groups:
          type: array
          items:
            $ref: '#/components/schemas/ExperimentGroup'
          description: >-
            The experiment groups and their parameter configurations.
        allocation:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            The percentage of eligible users allocated to the experiment.
        layerID:
          type: string
          description: >-
            The layer this experiment belongs to, if any.
        targetingGateID:
          type: string
          description: >-
            The gate used to filter eligible users for the experiment.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags associated with the experiment.
        createdTime:
          type: integer
          format: int64
          description: >-
            Timestamp when the experiment was created.
        lastModifiedTime:
          type: integer
          format: int64
          description: >-
            Timestamp when the experiment was last modified.
    ExperimentCreate:
      type: object
      description: >-
        Request body for creating a new experiment.
      required:
        - name
      properties:
        name:
          type: string
          description: >-
            The name of the experiment to create.
        description:
          type: string
          description: >-
            A human-readable description.
        hypothesis:
          type: string
          description: >-
            The hypothesis being tested.
        groups:
          type: array
          items:
            $ref: '#/components/schemas/ExperimentGroup'
          description: >-
            The experiment groups.
        allocation:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            The percentage of eligible users.
        layerID:
          type: string
          description: >-
            The layer to assign this experiment to.
        targetingGateID:
          type: string
          description: >-
            The gate used to filter eligible users.
        tags:
          type: array
          items:
            type: string
          description: >-
            Tags to associate with the experiment.
    ExperimentUpdate:
      type: object
      description: >-
        Request body for partially updating an experiment.
      properties:
        description:
          type: string
          description: >-
            Updated description.
        hypothesis:
          type: string
          description: >-
            Updated hypothesis.
        allocation:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            Updated allocation percentage.
        tags:
          type: array
          items:
            type: string
          description: >-
            Updated tags.
    ExperimentGroup:
      type: object
      description: >-
        An experiment group defining parameter values for a set of users.
      properties:
        name:
          type: string
          description: >-
            The name of the group (e.g., control, test).
        size:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            The percentage of allocated users assigned to this group.
        parameterValues:
          type: object
          description: >-
            The parameter key-value pairs for this group.
    Segment:
      type: object
      description: >-
        A user segment defining a group of users for targeting.
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the segment.
        name:
          type: string
          description: >-
            The name of the segment.
        description:
          type: string
          description: >-
            A human-readable description of the segment.
