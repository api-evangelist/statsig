      properties:
        id:
          type: string
          description: >-
            The unique identifier of the metric.
        name:
          type: string
          description: >-
            The name of the metric.
        description:
          type: string
          description: >-
            A human-readable description of the metric.
        type:
          type: string
          description: >-
            The type of metric (e.g., event_count, ratio, funnel).
