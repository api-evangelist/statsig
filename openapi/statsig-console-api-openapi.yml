      type: object
      description: >-
        Request body for creating a new tag.
      required:
        - name
      properties:
        name:
          type: string
          description: >-
            The name of the tag to create.
        description:
          type: string
          description: >-
            A human-readable description.
        color:
          type: string
          description: >-
