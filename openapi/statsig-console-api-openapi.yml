          description: >-
            The unique identifier of the user.
        email:
          type: string
          format: email
          description: >-
            The user email address.
        properties:
          type: object
          description: >-
            Custom properties associated with the user.
    Tag:
      type: object
      description: >-
        A tag used for organizing and categorizing entities.
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the tag.
        name:
          type: string
          description: >-
            The name of the tag.
        description:
          type: string
          description: >-
            A human-readable description.
        color:
          type: string
          description: >-
            The color associated with the tag for display.
