      properties:
        id:
          type: string
          description: >-
            The unique identifier of the layer.
        name:
          type: string
          description: >-
            The name of the layer.
        description:
          type: string
          description: >-
            A human-readable description of the layer.
        parameters:
          type: object
          description: >-
            The default parameter values for the layer.
        experiments:
          type: array
          items:
            type: string
          description: >-
            The IDs of experiments associated with this layer.
        createdTime:
          type: integer
          format: int64
          description: >-
            Timestamp when the layer was created.
    LayerCreate:
      type: object
      description: >-
        Request body for creating a new layer.
      required:
        - name
      properties:
        name:
          type: string
          description: >-
            The name of the layer to create.
        description:
          type: string
          description: >-
            A human-readable description.
        parameters:
          type: object
          description: >-
            The default parameter values for the layer.
    Holdout:
      type: object
      description: >-
        A holdout group that excludes users from specific features to
        measure long-term impact.
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the holdout.
        name:
          type: string
          description: >-
            The name of the holdout.
        description:
          type: string
          description: >-
            A human-readable description.
        passPercentage:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            The percentage of users in the holdout group.
        gateIDs:
          type: array
          items:
            type: string
          description: >-
            The gates affected by this holdout.
        isEnabled:
          type: boolean
          description: >-
            Whether the holdout is currently active.
    HoldoutCreate:
      type: object
      description: >-
        Request body for creating a new holdout group.
      required:
        - name
      properties:
        name:
          type: string
          description: >-
            The name of the holdout to create.
        description:
          type: string
          description: >-
            A human-readable description.
        passPercentage:
          type: number
          minimum: 0
          maximum: 100
          description: >-
            The percentage of users in the holdout group.
        gateIDs:
          type: array
          items:
            type: string
          description: >-
            The gates to include in the holdout.
    Autotune:
      type: object
      description: >-
        An autotune configuration that automatically optimizes parameter
        values based on a target metric.
      properties:
        id:
          type: string
          description: >-
            The unique identifier of the autotune.
        name:
          type: string
          description: >-
            The name of the autotune.
        description:
          type: string
          description: >-
            A human-readable description.
        status:
          type: string
          description: >-
            The current status of the autotune.
        variants:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: >-
                  The name of the variant.
              parameterValues:
                type: object
                description: >-
                  The parameter values for this variant.
          description: >-
            The variants being optimized.
        successMetric:
          type: string
          description: >-
            The metric being optimized for.
    AutotuneCreate:
      type: object
      description: >-
